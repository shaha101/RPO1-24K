{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<section class="news-block">
            <div class="container-fluid">
        <div class="news-left">
            <h3 class="mb-10">{{ post.title }}</h3>
            <p class="mb-15">{{ post.created_at|date:"d.m.Y" }}</p>
            <img src="{{ post.image_url }}" alt="" class="rounded-full-img">
            <p class="mb-15">{{ post.description }}</p>
            <a href="#">#{{ post.category.name }}</a>
        </div>
            <div class="news-right">
                <div class="news-block-adv">
                <h3>Advertising</h3>
                <div class="news-adv-card">
                    {% for adv in advs %}
                    <img src="{{ adv.image_url }}" alt="Advertising" class="news-adv-img">
                    {% endfor %}</div>
                </div>
            </div>
            </div>

    </section>
{% endblock %}
