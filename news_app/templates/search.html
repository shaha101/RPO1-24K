{% extends 'base.html' %}

{% block title %}Search{% endblock %}

{% block content %}
<section class="news-block">
            <div class="container-fluid">
        <div class="news-left">
            <h3>Search</h3>
            <form action="{% url 'search_results' %}" name="get">
                <label for="search">Enter news title or description</label>
                <input type="search" name="q" type="text" placeholder="Title or Description" required>
                <button type="submit">Search</button>
            </form>


            </div>
            <div class="news-right">
                <div class="news-block-adv">
                <h3>Advertising</h3>
                <div class="news-adv-card">
                    {% for adv in advs %}
                    <img src="{{ adv.image_url }}" alt="Advertising" class="news-adv-img">
                    {% endfor %}</div>
                </div>
            </div>
            </div>

    </section>
{% endblock %}
